<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberven Premium Engine</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: radial-gradient(circle at 50% 0%, #0d2633, #05070a);
            color: #ffffff; padding: 30px 15px; max-width: 750px; margin: 0 auto; min-height: 100vh;
        }
        h1 {
            text-align: center; font-size: 30px; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px;
            background: linear-gradient(45deg, #00D2FF, #00FFCC); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #7a939e; font-size: 11px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 35px; }
        .input-panel {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px; padding: 25px; margin-bottom: 35px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        label { display: block; font-size: 13px; color: #00D2FF; font-weight: 600; margin-bottom: 8px; }
        input {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; font-size: 15px; margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00FFCC; box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        button {
            width: 100%; padding: 15px; background: linear-gradient(45deg, #00D2FF, #00FFCC);
            border: none; border-radius: 12px; color: #05070a; font-size: 16px; font-weight: 700;
            cursor: pointer; letter-spacing: 1px; transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,210,255,0.3); }
        button:disabled { background: #3a4d54; color: #7a939e; cursor: not-allowed; transform: none; box-shadow: none; }
        .loader { display: none; text-align: center; margin: 20px 0; font-size: 14px; color: #00FFCC; font-style: italic; }
        
        /* كروت النتائج المذابة Liquid Glass */
        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(25px) saturate(140%); -webkit-backdrop-filter: blur(25px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.07); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px; padding: 25px; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .day-badge {
            display: inline-block; padding: 5px 15px; background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(0,255,204,0.15));
            border: 1px solid rgba(0,210,255,0.3); border-radius: 50px; font-size: 12px; font-weight: 700; color: #00FFCC; margin-bottom: 15px;
        }
        h3 { color: #ffffff; margin: 0 0 12px 0; font-size: 20px; }
        p { font-size: 14px; line-height: 1.6; color: #cfe0e3; margin: 10px 0; }
        strong { color: #00D2FF; }
        .highlight { color: #00FFCC; font-weight: 600; }
        .copy-text {
            display: block; background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.02); margin-top: 8px; white-space: pre-line;
        }
        .tags { color: #00D2FF; font-weight: 500; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <h1>⚡ CYBERVEN DIGITAL HUB ⚡</h1>
    <div class="subtitle">Premium Liquid Glass Engine</div>
    <div class="input-panel">
        <label>🎯 BUSINESS NICHE</label>
        <input type="text" id="niche" placeholder="e.g., Marketing, E-commerce, Fitness">
        <label>👥 TARGET AUDIENCE</label>
        <input type="text" id="audience" placeholder="e.g., Beginners, Corporate Leaders">
        <label>📅 CONTENT STRATEGY PERIOD (DAYS)</label>
        <input type="number" id="days" value="7" min="1" max="30">
        <button id="btn" onclick="generateStrategy()">LAUNCH AI STRATEGY ENGINE</button>
        <div class="loader" id="loader">⏳ Melting glass layers & weaving high-converting assets... Please wait...</div>
    </div>
    <div id="results-container"></div>

    <script>
        async function generateStrategy() {
            const niche = document.getElementById('niche').value;
            const audience = document.getElementById('audience').value;
            const days = document.getElementById('days').value;
            const btn = document.getElementById('btn');
            const loader = document.getElementById('loader');
            const container = document.getElementById('results-container');

            if(!niche || !audience) { alert('Please fill in all cosmic fields!'); return; }
            btn.disabled = true; loader.style.display = 'block'; container.innerHTML = '';

            try {
                // هنا نقوم بالاتصال بالسيرفر الخاص بنا مباشرة
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche, audience, days })
                });
                const data = await response.json();
                if(data.error) { container.innerHTML = `<p style="color:red; text-align:center;">Error: ${data.error}</p>`; }
                else { container.innerHTML = data.html; }
            } catch (err) {
                container.innerHTML = `<p style="color:red; text-align:center;">Connection Error: ${err.message}</p>`;
            } finally {
                btn.disabled = false; loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
