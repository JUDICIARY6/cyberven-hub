<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberven Digital Hub</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; color: #00f2fe; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; text-shadow: 0 0 15px rgba(0, 242, 254, 0.6); }
        .header p { color: #8892b0; font-size: 1rem; letter-spacing: 1px; }
        .container { width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5); margin-bottom: 40px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; color: #00f2fe; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 1rem; transition: all 0.3s ease; }
        .form-group input:focus { outline: none; border-color: #00f2fe; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; border-radius: 14px; color: #020c1b; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4); text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 242, 254, 0.6); }
        .error-message { color: #ff4a4a; text-align: center; margin-top: 20px; font-size: 0.95rem; display: none; font-weight: 500; }
        .results-container { width: 100%; max-width: 800px; margin-top: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); border-color: rgba(0, 242, 254, 0.3); }
        .day-badge { display: inline-block; padding: 6px 14px; background: rgba(0, 242, 254, 0.15); color: #00f2fe; border-radius: 30px; font-weight: bold; font-size: 0.85rem; margin-bottom: 15px; border: 1px solid rgba(0, 242, 254, 0.3); }
        .glass-card h3 { margin: 0 0 15px 0; color: #ffffff; font-size: 1.3rem; }
        .highlight { color: #00f2fe; font-weight: 600; }
        .copy-text { display: block; background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 10px; border-left: 3px solid #00f2fe; margin-top: 8px; color: #cbd5e1; white-space: pre-wrap; line-height: 1.6; }
        .tags { margin-top: 15px; color: #38bdf8; font-weight: 500; }
        .loading { display: none; text-align: center; margin: 20px 0; color: #00f2fe; font-weight: 500; }
        .loading::after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ CYBERVEN DIGITAL HUB ⚡</h1>
        <p>PREMIUM LIQUID GLASS ENGINE</p>
    </div>
    <div class="container">
        <div class="form-group"><label>🎯 BUSINESS NICHE</label><input type="text" id="niche" placeholder="e.g. Marketing, Fitness"></div>
        <div class="form-group"><label>👥 TARGET AUDIENCE</label><input type="text" id="audience" placeholder="e.g. Professionals, Students"></div>
        <div class="form-group"><label>📅 CONTENT STRATEGY PERIOD (DAYS)</label><input type="number" id="days" value="7" min="1" max="30"></div>
        <button class="btn" id="generateBtn">LAUNCH AI STRATEGY ENGINE</button>
        <div class="loading" id="loadingStatus">Processing Engine Intelligence</div>
        <div class="error-message" id="errorDisplay"></div>
    </div>
    <div class="results-container" id="results"></div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const niche = document.getElementById('niche').value.trim();
            const audience = document.getElementById('audience').value.trim();
            const days = document.getElementById('days').value;
            const errorDisplay = document.getElementById('errorDisplay');
            const loadingStatus = document.getElementById('loadingStatus');
            const resultsContainer = document.getElementById('results');
            
            if (!niche || !audience) {
                errorDisplay.textContent = "Please fill in all fields to fuel the engine.";
                errorDisplay.style.display = "block";
                return;
            }
            
            errorDisplay.style.display = "none";
            loadingStatus.style.display = "block";
            resultsContainer.innerHTML = "";
            
            try {
                // تعديل ذهبي: استدعاء تلقائي لنفس السيرفر الحالي بدون كتابة روابط ثابتة لمنع الحجب
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche, audience, days })
                });
                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error || "Failed server response.");
                loadingStatus.style.display = "none";
                resultsContainer.innerHTML = data.html;
            } catch (err) {
                loadingStatus.style.display = "none";
                errorDisplay.textContent = "Error: " + err.message;
                errorDisplay.style.display = "block";
            }
        });
    </script>
</body>
</html>
